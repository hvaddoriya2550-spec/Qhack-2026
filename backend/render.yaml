services:
  - type: web
    name: cleo-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SEARCH_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./cloover.db
